<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Reset Password</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px;">
  <div style="max-width:600px;margin:auto;background:#fff;padding:40px;border-radius:8px;">
    <h2 style="color:#2563eb;">Reset Your Password</h2>
    <p>Hi <span th:text="${firstName}">User</span>,</p>
    <p>Click the button below to reset your password:</p>
    <a th:href="${resetUrl}" style="display:inline-block;padding:12px 24px;background:#dc2626;color:#fff;text-decoration:none;border-radius:6px;margin:16px 0;">Reset Password</a>
    <p style="color:#666;font-size:12px;">This link expires in 1 hour. If you did not request a password reset, ignore this email.</p>
  </div>
</body>
</html>
